services:
  php:
    container_name: rickandmorty-laravel
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "9001:9000"
    command: sh -c "cp -r /var/www/build_cache/. /var/www/html/public/build/ && chmod -R 777 /var/www/html/storage /var/www/html/bootstrap/cache && php-fpm"

  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
